spring:
  application:
    name: "eventflow-api"

  datasource:
    url: "jdbc:postgresql://localhost:5432/event-flow"
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate.ddl-auto: validate
  
  flyway:
    enabled: true
    classpath: db/migration